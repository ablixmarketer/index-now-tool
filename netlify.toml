[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"
  environment = { NODE_ENV = "development" }


[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "cors", "dotenv", "fast-xml-parser", "p-limit", "serverless-http", "zod", "@types/xml2js", "xml2js", "lightningcss"]

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# SPA fallback - serve index.html for all non-API routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
